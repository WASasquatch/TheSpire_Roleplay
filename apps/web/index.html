<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      no-referrer: prevents external resources loaded via admin-configured
      branding (banner cover image url(...), avatar URLs) from leaking the
      visitor's URL to third parties on their first paint.
    -->
    <meta name="referrer" content="no-referrer" />
    <!-- Favicons + platform tile icons. All served from apps/web/public/ at
         the root URL. Vite copies the public/ tree verbatim into the build. -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon-196x196.png" sizes="196x196" />
    <link rel="icon" type="image/png" href="/favicon-128.png" sizes="128x128" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <link rel="apple-touch-icon-precomposed" sizes="57x57" href="/apple-touch-icon-57x57.png" />
    <link rel="apple-touch-icon-precomposed" sizes="60x60" href="/apple-touch-icon-60x60.png" />
    <link rel="apple-touch-icon-precomposed" sizes="72x72" href="/apple-touch-icon-72x72.png" />
    <link rel="apple-touch-icon-precomposed" sizes="76x76" href="/apple-touch-icon-76x76.png" />
    <link rel="apple-touch-icon-precomposed" sizes="114x114" href="/apple-touch-icon-114x114.png" />
    <link rel="apple-touch-icon-precomposed" sizes="120x120" href="/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon-precomposed" sizes="144x144" href="/apple-touch-icon-144x144.png" />
    <link rel="apple-touch-icon-precomposed" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <meta name="msapplication-TileColor" content="#f4efe2" />
    <meta name="msapplication-TileImage" content="/mstile-144x144.png" />
    <meta name="msapplication-square70x70logo" content="/mstile-70x70.png" />
    <meta name="msapplication-square150x150logo" content="/mstile-150x150.png" />
    <meta name="msapplication-wide310x150logo" content="/mstile-310x150.png" />
    <meta name="msapplication-square310x310logo" content="/mstile-310x310.png" />
    <meta name="theme-color" content="#1a1a1a" />

    <!--
      SEO + social-card meta. The server (apps/server/src/seo.ts) rewrites
      title, description, og:*, twitter:*, and the canonical link with the
      admin-configured siteName + metaDescription before serving the splash,
      so non-JS crawlers see live values. The defaults below are what
      anyone fetching the file directly (dev, raw GET) would see.
    -->
    <title>The Spire - Roleplay Chat &amp; Collaborative Writing</title>
    <meta name="description" content="The Spire is a roleplay chat community for writers with live chat rooms, character profiles, forums, worlds, and a Scriptorium for collaborative stories." />
    <meta name="keywords" content="roleplay chat, online roleplay, RP chat, writing community, collaborative fiction, story writing, character roleplay, forum roleplay, The Spire" />
    <link rel="canonical" href="https://thespire.fly.dev/" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Spire - Roleplay Chat &amp; Collaborative Writing" />
    <meta property="og:description" content="The Spire is a roleplay chat community for writers with live chat rooms, character profiles, forums, worlds, and a Scriptorium for collaborative stories." />
    <meta property="og:url" content="https://thespire.fly.dev/" />
    <meta property="og:image" content="/the_spire_bg.jpg" />
    <meta property="og:site_name" content="The Spire" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Spire - Roleplay Chat &amp; Collaborative Writing" />
    <meta name="twitter:description" content="The Spire is a roleplay chat community for writers with live chat rooms, character profiles, forums, worlds, and a Scriptorium for collaborative stories." />
    <meta name="twitter:image" content="/the_spire_bg.jpg" />

    <!--
      JSON-LD structured data. The server rewrites name + description with
      live values; url is rewritten to the absolute request origin. Schema
      type WebApplication is the closest match for an interactive chat app
      that runs in the browser without needing install.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "The Spire",
      "description": "The Spire is a roleplay chat community for writers with live chat rooms, character profiles, forums, worlds, and a Scriptorium for collaborative stories.",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Web",
      "url": "https://thespire.fly.dev/"
    }
    </script>

    <!-- Reading-font catalog. These match the dropdown in ProfileEditor
         (Settings → Reading & accessibility → Font family) — loading
         them up-front keeps the picker preview accurate and avoids a
         FOUT when a user selects one. `display=swap` keeps text
         visible during the swap; preconnect saves a couple round-trips
         on first paint. Weights 400/700 only — chat doesn't use heavier
         display weights. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;700&family=Lato:wght@400;700&family=Lora:wght@400;700&family=Merriweather:wght@400;700&family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&family=Roboto+Slab:wght@400;700&family=Source+Sans+3:wght@400;700&display=swap"
    />

    <!-- HEAD_EXTRA: server splices admin-configured analytics scripts here. -->
  </head>
  <body>
    <!-- Theme is applied via a React-controlled wrapper inside #root, not on body. -->
    <div id="root"></div>
    <!-- `type="module"` already implies defer per spec, but the explicit
         attribute satisfies SEO auditors that score render-blocking by
         pattern-matching the script tag. -->
    <script type="module" defer src="/src/main.tsx"></script>
  </body>
</html>
