    }
    function rollDrop(x,y,guar){
      if(guar){ spawnDrop(x-20,y,'heart'); spawnDrop(x+20,y,'heart'); spawnDrop(x,y,'crystal'); return; }
      const r=Math.random(); if(r<0.12) spawnDrop(x,y,'heart'); else if(r<0.20) spawnDrop(x,y,'crystal');
    }
    function applyDrop(d){
      if(d.kind==='heart'){ P.hp=Math.min(P.maxhp,P.hp+30); toast('+30 vigor'); Fx.flash('#88ff9c',0.16,0.2); return; }
      if(d.school==='martial'){
        buffs.fam=null; buffs.nodes=[];
        if(d.sub==='dmg'){ buffs.dmg=Math.min(2.4,buffs.dmg+0.25); toast('Martial boon — Wrath ×'+buffs.dmg.toFixed(2)+' (familiars dismissed)'); }
        else if(d.sub==='speed'){ buffs.speed=Math.min(1.7,buffs.speed+0.16); toast('Martial boon — Swiftness (familiars dismissed)'); }
        else { buffs.jump=Math.min(1.6,buffs.jump+0.13); toast('Martial boon — Leap (familiars dismissed)'); }
        Fx.flash('#c9a24b',0.2,0.25);
      } else {
        buffs.dmg=buffs.speed=buffs.jump=1; setFam(d.sub);
        toast('Arcane pact — '+(d.sub==='wisp'?'Wisp familiars':'Spirit blades')+' (martial boons fade)');
        Fx.flash('#b07ae0',0.24,0.3);
      }
    }
    function killEnemy(e){ score+=e.val; addPart(e.x+e.w/2,e.y+e.h/2, e.type==='lich'?'#b07ae0':'#88ff9c',14); rollDrop(e.x+e.w/2,e.y,false); e.dead=true; }

    reset();
    setHint('<b>← →</b> march &nbsp; <b>↑</b> leap &nbsp; <b>Space</b> hurl weapon. Reach the gate; grab boons — martial &amp; arcane boons cancel each other.');
    setActions('STRIKE','LEAP');

    function step(dt){
      t+=dt; if(msgT>0) msgT-=dt; if(atkCd>0) atkCd-=dt; if(P.inv>0) P.inv-=dt;
      // --- player movement ---
      const sp=MAXRUN*buffs.speed; let tvx=0;
      if(keys.ArrowLeft) tvx=-sp; if(keys.ArrowRight) tvx=sp;
      if(tvx!==0) P.face=Math.sign(tvx);
      P.vx += clamp(tvx-P.vx, -ACCEL*dt, ACCEL*dt);
      if(tvx===0) P.vx*=Math.pow(0.0015,dt);
      P.vy += GR*dt; if(P.vy>900) P.vy=900;
      collide(P,dt);
      if(keys.Space) fire();
      if(P.onGround){ lastGX=P.x; lastGY=P.y; }
      if(P.y>H+40){ Fx.flash('#e0476e',0.45,0.35); Fx.shake(7,0.4); Fx.freeze(0.45); P.hp-=20;
        if(P.hp<=0){ die(); return; }
        toast('The abyss claims a tithe — −20 vigor'); P.x=lastGX; P.y=lastGY; P.vx=0; P.vy=0; }
      camX=clamp(P.x+P.w/2-W*0.4, 0, Math.max(0,levelW-W));
      // gate
      if(P.onGround && P.x+P.w/2>exitX){ depth++; score+=200; Fx.flash('#c9a24b',0.45,0.6); genLevel(depth); placeStart(); seedEnemies(); boss=null; bossDone=false; toast('The gate yields — Depth '+depth); return; }
      // boss trigger
      if(!bossDone && !boss && P.x>levelW*0.6){ spawnBoss(); bossDone=true; }
      // normal spawns
      if(!boss){ spawnAcc+=dt; const iv=Math.max(0.7,2.3-depth*0.12);
        if(spawnAcc>=iv && enemies.length<5+depth){ spawnAcc=0; const ex=(Math.random()<0.8?camX+W+rand(20,120):camX-rand(20,80)); spawnEnemy(clamp(ex,20,levelW-20)); } }

      // --- enemies ---
      for(const e of enemies){
        if(e.dead) continue;
        e.t+=dt; if(e.hit>0)e.hit-=dt;
        const dx=(P.x+P.w/2)-(e.x+e.w/2), dy=(P.y+P.h/2)-(e.y+e.h/2);
        if(e.fly){
          if(e.type==='lich'){
            e.x+=Math.sign(dx)*e.spd*dt*0.6; e.y+=Math.sin(e.t*1.5)*16*dt;
            e.fire-=dt; if(e.fire<=0 && Math.abs(dx)<440){ e.fire=rand(1.6,2.8); const ang=Math.atan2(dy,dx);
              ebolts.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:Math.cos(ang)*185,vy:Math.sin(ang)*185,life:3,r:5}); }
          } else if(e.type==='bat'){ e.x+=Math.sign(dx)*e.spd*dt; e.y+=Math.sin(e.t*6)*46*dt+Math.sign(dy)*e.spd*0.4*dt; }
          else { e.x+=Math.sign(dx)*e.spd*dt; e.y+=Math.sin(e.t*3)*24*dt+Math.sign(dy)*e.spd*0.5*dt; }
          e.y=clamp(e.y,40,GY-e.h);
        } else { e.vx=Math.sign(dx)*e.spd; e.vy+=GR*dt; collide(e,dt); if(e.y>H+60) e.dead=true; }
        if(P.inv<=0 && ov(P,e)){ P.hp-=e.dmg; P.inv=1.0; P.vx=-Math.sign(dx)*230; P.vy=-210; Fx.flash('#e0476e',0.32,0.25); Fx.shake(6,0.25); if(P.hp<=0){die();} }
      }
      enemies=enemies.filter(e=>!e.dead);

      // --- boss ---
      if(boss){
        boss.t+=dt; if(boss.hit>0)boss.hit-=dt;
        const bdx=P.x-boss.x, bdy=P.y-boss.y;
        boss.x+=Math.sign(bdx)*boss.spd*dt; boss.y+=Math.sin(boss.t*0.8)*18*dt; boss.y=clamp(boss.y,80,GY-boss.h);
        boss.atk-=dt;
        if(boss.atk<=0){ boss.atk=rand(1.8,2.8);
          const ba=Math.atan2((P.y)-(boss.y+boss.h/2),(P.x)-(boss.x+boss.w/2));
          for(let k=-2;k<=2;k++){ const ang=ba+k*0.2; ebolts.push({x:boss.x+boss.w/2,y:boss.y+boss.h/2,vx:Math.cos(ang)*175,vy:Math.sin(ang)*175,life:3.5,r:6,big:true}); }
          if(Math.random()<0.5 && enemies.length<8) spawnEnemy(boss.x+ri(-80,120));
        }
        if(P.inv<=0 && ov(P,boss)){ P.hp-=boss.dmg; P.inv=1.1; P.vx=-Math.sign(bdx)*270; P.vy=-230; Fx.flash('#e0476e',0.4,0.3); Fx.shake(9,0.3); if(P.hp<=0)die(); }
      }

      // --- enemy bolts ---
      for(const b of ebolts){ b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
        if(P.inv<=0 && P.x<b.x+b.r && P.x+P.w>b.x-b.r && P.y<b.y+b.r && P.y+P.h>b.y-b.r){ P.hp-=b.big?18:10; P.inv=0.9; b.life=0; Fx.flash('#e0476e',0.3,0.22); Fx.shake(5,0.2); if(P.hp<=0)die(); } }
      ebolts=ebolts.filter(b=>b.life>0 && b.x>camX-60 && b.x<camX+W+60 && b.y>-40 && b.y<H+40);

      // --- player shots ---
      for(const s of shots){
        if(s.kind==='arc'){ s.vy+=GR*0.55*dt; s.y+=s.vy*dt; }
        s.x+=s.vx*dt; s.life-=dt;
        const sb={x:s.x-s.r,y:s.y-s.r,w:s.r*2,h:s.r*2};
        for(const so of solids){ if(ov(sb,so)){ s.life=0; break; } }
        for(const e of enemies){ if(!e.dead && ov(sb,e)){ e.hp-=s.dmg; e.hit=0.1; addPart(s.x,s.y,s.col,5); if(!s.pierce) s.life=0; if(e.hp<=0) killEnemy(e); if(!s.pierce) break; } }
        if(boss && ov(sb,boss)){ boss.hp-=s.dmg; boss.hit=0.1; addPart(s.x,s.y,s.col,5); if(!s.pierce) s.life=0;
          if(boss.hp<=0){ score+=boss.val; addPart(boss.x+boss.w/2,boss.y+boss.h/2,'#88ff9c',30); rollDrop(boss.x+boss.w/2,boss.y+boss.h/2,true); Fx.flash('#c9a24b',0.45,0.6); Fx.shake(10,0.5); toast('The Gravelord falls.'); boss=null; } }
      }
      shots=shots.filter(s=>s.life>0 && s.x>camX-80 && s.x<camX+W+80 && s.y<H+60);
      enemies=enemies.filter(e=>!e.dead);

      // --- familiars ---
      if(buffs.fam){
        for(const n of buffs.nodes){
          n.a+=dt*2.4;
          n.x=P.x+P.w/2+Math.cos(n.a)*36; n.y=P.y+P.h/2+Math.sin(n.a)*28;
          if(buffs.fam==='blade'){
            const nb={x:n.x-7,y:n.y-7,w:14,h:14};
            for(const e of enemies){ if(!e.dead && ov(nb,e)){ e.hp-=34*dt; if(e.hp<=0) killEnemy(e); } }
            if(boss && ov(nb,boss)){ boss.hp-=34*dt; if(boss.hp<=0){ score+=boss.val; rollDrop(boss.x+32,boss.y,true); toast('The Gravelord falls.'); boss=null; } }
          } else { // wisp: auto-fire at nearest
            n.cd-=dt;
            if(n.cd<=0){ let best=null,bd=1e9;
              for(const e of enemies){ if(e.dead)continue; const d=Math.hypot(e.x-n.x,e.y-n.y); if(d<bd&&d<380){bd=d;best=e;} }
              if(boss){ const d=Math.hypot(boss.x-n.x,boss.y-n.y); if(d<bd&&d<420){bd=d;best=boss;} }
              if(best){ n.cd=0.55; const ang=Math.atan2((best.y+best.h/2)-n.y,(best.x+best.w/2)-n.x);
                shots.push({x:n.x,y:n.y,vx:Math.cos(ang)*420,vy:Math.sin(ang)*420,r:4,kind:'straight',dmg:9,col:'#cda6ff',pierce:false,life:1.1}); }
              else n.cd=0.2;
            }
          }
        }
      }

      // --- drops ---
      for(const d of drops){ d.t+=dt; d.vy+=GR*dt; d.y+=d.vy*dt; if(d.y>GY-14){ d.y=GY-14; d.vy=0; }
        if(ov(P,d)){ applyDrop(d); d.dead=true; } }
      drops=drops.filter(d=>!d.dead);

      // --- particles ---
      for(const p of parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=300*dt; }
      parts=parts.filter(p=>p.life>0);
    }

    // ---------- render ----------
    function rect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
    function drawEnemy(e){
      const x=e.x, y=e.y; ctx.save();
      if(e.hit>0){ ctx.globalCompositeOperation='lighter'; }
      if(e.type==='zombie'){ rect(x,y,e.w,e.h,'#5c7a52'); rect(x+2,y+4,e.w-4,6,'#33301f'); ctx.fillStyle='#ff5b5b'; ctx.fillRect(x+4,y+8,3,3); ctx.fillRect(x+e.w-7,y+8,3,3); }
      else if(e.type==='spider'){ ctx.strokeStyle='#1c1430'; ctx.lineWidth=2; for(let i=-1;i<=1;i+=2){ ctx.beginPath(); ctx.moveTo(x+e.w/2,y+e.h/2); ctx.lineTo(x+e.w/2+i*e.w*0.7,y); ctx.moveTo(x+e.w/2,y+e.h/2); ctx.lineTo(x+e.w/2+i*e.w*0.7,y+e.h); ctx.stroke(); } ctx.fillStyle='#241a3c'; ctx.beginPath(); ctx.ellipse(x+e.w/2,y+e.h/2,e.w/2,e.h/2,0,0,7); ctx.fill(); ctx.fillStyle='#e0476e'; ctx.fillRect(x+e.w/2-4,y+e.h/2-1,2,2); ctx.fillRect(x+e.w/2+2,y+e.h/2-1,2,2); }
      else if(e.type==='bat'){ ctx.fillStyle='#3a2c50'; ctx.beginPath(); ctx.moveTo(x,y+e.h/2); ctx.lineTo(x+e.w/2,y); ctx.lineTo(x+e.w,y+e.h/2); ctx.lineTo(x+e.w/2,y+e.h); ctx.fill(); ctx.fillStyle='#ffd9e2'; ctx.fillRect(x+e.w/2-2,y+e.h/2-1,4,2); }
      else { ctx.fillStyle='#2a2342'; ctx.beginPath(); ctx.moveTo(x+e.w/2,y); ctx.lineTo(x+e.w,y+e.h); ctx.lineTo(x,y+e.h); ctx.fill(); ctx.fillStyle='#88ff9c'; ctx.beginPath(); ctx.arc(x+e.w/2,y+e.h*0.4,3,0,7); ctx.fill(); }
      ctx.restore();
      if(e.hp<e.maxhp){ ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(x,y-6,e.w,3); ctx.fillStyle='#e0476e'; ctx.fillRect(x,y-6,e.w*Math.max(0,e.hp/e.maxhp),3); }
    }
    return {
      keydown(c){
        if(state!=='play'){ if((c==='Enter'||c==='Space') && !Fx.frozen()) reset(); return; }
        if(c==='ArrowUp' && P.onGround){ P.vy=JUMPV*buffs.jump; P.onGround=false; }
        if(c==='Space') fire();
      },
      update(dt){ if(state!=='play') return; step(dt); },
      render(){
        // sky
        const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0c0820'); g.addColorStop(1,'#1a1130'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='rgba(236,227,207,.9)'; ctx.beginPath(); ctx.arc(W-70,80,30,0,7); ctx.fill();
        ctx.fillStyle='rgba(12,8,32,.6)'; ctx.beginPath(); ctx.arc(W-58,72,28,0,7); ctx.fill();
        // parallax silhouettes
        ctx.fillStyle='rgba(60,40,90,.4)';
        for(let i=0;i<8;i++){ const px=((i*180 - camX*0.3)%(W+180)+W+180)%(W+180)-90; ctx.fillRect(px,GY-60,40,60); }

        ctx.save(); ctx.translate(-camX,0);
        // solids
        for(const s of solids){ ctx.fillStyle=s.ground?'#241a36':'#2e2348'; ctx.fillRect(s.x,s.y,s.w,s.h); ctx.fillStyle='rgba(201,162,75,.25)'; ctx.fillRect(s.x,s.y,s.w,3); }
        // decorations
        for(const d of decos){ if(d.type==='tomb'){ ctx.fillStyle='#3b3354'; ctx.fillRect(d.x-7,d.y-22,14,22); ctx.beginPath(); ctx.arc(d.x,d.y-22,7,Math.PI,0); ctx.fill(); ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.beginPath(); ctx.moveTo(d.x,d.y-18); ctx.lineTo(d.x,d.y-8); ctx.moveTo(d.x-4,d.y-14); ctx.lineTo(d.x+4,d.y-14); ctx.stroke(); } else { ctx.strokeStyle='#241a30'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x,d.y-34); ctx.moveTo(d.x,d.y-20); ctx.lineTo(d.x-10,d.y-30); ctx.moveTo(d.x,d.y-24); ctx.lineTo(d.x+10,d.y-32); ctx.stroke(); } }
        // exit portal
        const pg=ctx.createLinearGradient(exitX,exitY-90,exitX,exitY); pg.addColorStop(0,'rgba(82,224,214,.7)'); pg.addColorStop(1,'rgba(176,122,224,.3)');
        ctx.fillStyle=pg; ctx.fillRect(exitX-2,exitY-86,30,86);
        ctx.strokeStyle='#52e0d6'; ctx.lineWidth=3; ctx.strokeRect(exitX-4,exitY-90,34,90);
        ctx.fillStyle='rgba(255,255,255,'+(0.4+0.3*Math.sin(t*4))+')'; ctx.fillRect(exitX+4,exitY-78,16,70);
        // drops
        for(const d of drops){ const bob=Math.sin(d.t*5)*2;
          if(d.kind==='heart'){ ctx.fillStyle='#e0476e'; ctx.beginPath(); ctx.arc(d.x+5,d.y+5+bob,5,0,7); ctx.arc(d.x+11,d.y+5+bob,5,0,7); ctx.moveTo(d.x,d.y+6+bob); ctx.lineTo(d.x+8,d.y+15+bob); ctx.lineTo(d.x+16,d.y+6+bob); ctx.fill(); }
          else { ctx.fillStyle=d.school==='martial'?'#c9a24b':'#b07ae0'; ctx.save(); ctx.translate(d.x+8,d.y+8+bob); ctx.rotate(Math.PI/4); ctx.fillRect(-6,-6,12,12); ctx.restore(); ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillRect(d.x+6,d.y+4+bob,2,8); } }
        // enemy bolts
        for(const b of ebolts){ ctx.fillStyle=b.big?'#ff7a3c':'#b07ae0'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill(); ctx.fillStyle='rgba(255,255,255,.4)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.5,0,7); ctx.fill(); }
        // shots
        for(const s of shots){ ctx.fillStyle=s.col; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill(); ctx.globalAlpha=.4; ctx.beginPath(); ctx.arc(s.x-s.vx*0.01,s.y-s.vy*0.01,s.r*0.7,0,7); ctx.fill(); ctx.globalAlpha=1; }
        // enemies
        for(const e of enemies) drawEnemy(e);
        // boss
        if(boss){ const x=boss.x,y=boss.y; ctx.fillStyle=boss.hit>0?'#cfe8d0':'#3a3158'; rr(x,y,boss.w,boss.h,8); ctx.fill();
          ctx.fillStyle='#1a1130'; rr(x+10,y+14,boss.w-20,boss.h-26,6); ctx.fill();
          ctx.fillStyle='#88ff9c'; ctx.beginPath(); ctx.arc(x+22,y+30,6,0,7); ctx.arc(x+boss.w-22,y+30,6,0,7); ctx.fill();
          ctx.fillStyle='#c9a24b'; ctx.fillRect(x+boss.w/2-3,y-10,6,12); }
        // familiars
        if(buffs.fam){ for(const n of buffs.nodes){ if(buffs.fam==='blade'){ ctx.save(); ctx.translate(n.x,n.y); ctx.rotate(n.a*2); ctx.fillStyle='#9fe7ff'; ctx.fillRect(-2,-9,4,18); ctx.restore(); } else { ctx.fillStyle='#cda6ff'; ctx.beginPath(); ctx.arc(n.x,n.y,5,0,7); ctx.fill(); ctx.fillStyle='rgba(205,166,255,.4)'; ctx.beginPath(); ctx.arc(n.x,n.y,9,0,7); ctx.fill(); } } }
        // player
        if(!(P.inv>0 && Math.floor(t*20)%2)){ const x=P.x,y=P.y;
          ctx.fillStyle='#8a93a8'; rr(x,y+8,P.w,P.h-8,3); ctx.fill();
          ctx.fillStyle='#b8c0d0'; rr(x+1,y,P.w-2,12,3); ctx.fill();
          ctx.fillStyle=WEAPONS[weapon].col; ctx.fillRect(x+(P.face>0?P.w-3:0),y-6,3,7); // plume
          // weapon in hand
          ctx.strokeStyle=WEAPONS[weapon].col; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x+P.w/2,y+18); ctx.lineTo(x+P.w/2+P.face*12,y+16); ctx.stroke();
        }
        // particles
        for(const p of parts){ ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); ctx.restore(); }
        ctx.restore();

        // ---- HUD (screen space) ----
        ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(12,12,160,14);
        ctx.fillStyle='#e0476e'; ctx.fillRect(12,12,160*Math.max(0,P.hp/P.maxhp),14);
        ctx.strokeStyle='#c9a24b'; ctx.lineWidth=1.5; ctx.strokeRect(12,12,160,14);
        ctx.textAlign='left'; ctx.fillStyle='#ece3cf'; ctx.font='700 12px "Spline Sans Mono", monospace';
        ctx.fillText('DEPTH '+depth+'  ·  '+String(score).padStart(5,'0'), 12, 40);
        ctx.fillStyle=WEAPONS[weapon].col; ctx.fillText('⚔ '+WEAPONS[weapon].name.toUpperCase(), 12, 56);
        // buff readout
        ctx.textAlign='right'; ctx.fillStyle='#b9a7e6'; let by=24;
        if(buffs.fam){ ctx.fillText((buffs.fam==='wisp'?'✦ WISPS':'† BLADES'), W-12, by); by+=15; }
        if(buffs.dmg>1){ ctx.fillStyle='#c9a24b'; ctx.fillText('WRATH ×'+buffs.dmg.toFixed(2), W-12, by); by+=15; }
        if(buffs.speed>1){ ctx.fillStyle='#52e0d6'; ctx.fillText('SWIFT ×'+buffs.speed.toFixed(2), W-12, by); by+=15; }
        if(buffs.jump>1){ ctx.fillStyle='#88ff9c'; ctx.fillText('LEAP ×'+buffs.jump.toFixed(2), W-12, by); by+=15; }
        // boss bar
        if(boss){ ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(W/2-120,74,240,12); ctx.fillStyle='#88ff9c'; ctx.fillRect(W/2-120,74,240*Math.max(0,boss.hp/boss.maxhp),12); ctx.strokeStyle='#c9a24b'; ctx.strokeRect(W/2-120,74,240,12); ctx.textAlign='center'; ctx.fillStyle='#ece3cf'; ctx.font='700 11px "Spline Sans Mono"'; ctx.fillText('GRAVELORD', W/2, 72); }
        // toast
        if(msgT>0){ ctx.textAlign='center'; ctx.globalAlpha=Math.min(1,msgT); ctx.fillStyle='#f3e6c0'; ctx.font='italic 600 16px "Cormorant Garamond", serif'; ctx.fillText(msg, W/2, H-30); ctx.globalAlpha=1; }

        if(state==='over' && !Fx.frozen()) overlay([
          {t:'CUT DOWN', color:'#e0476e'},
          {t:'Your crusade ends in the cold loam.'},
          {t:'Depth '+depth+'  ·  Score '+score, color:'#c9a24b'},
          {t:'Enter / STRIKE to march again', font:'italic 500 16px "Cormorant Garamond"', color:'#b9a7e6'}
        ]);
      },
      getState(){ return state; },
      getScore(){ return score; }
    };
  }

  // =====================================================================
  //  GAME 6 — VOIDWAKE (Asteroids · a soul adrift in the cosmic void)
  // =====================================================================
  function Voidwake(){
    const ship={x:W/2,y:H/2,a:-Math.PI/2,vx:0,vy:0,r:11,thrust:false,cd:0,inv:0};
    let rocks, bullets, saucer, sbolts, parts, lives, score, wave, state, t, saucerT;

    function rockShape(){ const n=ri(8,11), p=[]; for(let i=0;i<n;i++) p.push(rand(0.72,1.12)); return p; }
    function mkRock(x,y,size,w){ const spd=rand(14,30)+w*3, ang=rand(0,7);
      return {x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,size,r:size===3?34:size===2?20:11,a:rand(0,7),va:rand(-1.2,1.2),shape:rockShape()}; }
    function newWave(w){ rocks=[]; const n=3+Math.floor(w*0.8);
      for(let i=0;i<n;i++){ let x,y; do{ x=rand(0,W); y=rand(0,H); }while(Math.hypot(x-ship.x,y-ship.y)<150); rocks.push(mkRock(x,y,3,w)); } }
    function reset(){ ship.x=W/2;ship.y=H/2;ship.a=-Math.PI/2;ship.vx=0;ship.vy=0;ship.inv=2;ship.cd=0;
      bullets=[]; saucer=null; sbolts=[]; parts=[]; lives=3; score=0; wave=1; state='play'; t=0; saucerT=rand(13,20); newWave(1); }
    reset();
    setHint('<b>← →</b> turn &nbsp; <b>↑</b> thrust &nbsp; <b>Space</b> fire &nbsp; <b>↓</b> blink through the veil (risky).');
    setActions('FIRE','THRUST');

    function wrap(o){ if(o.x<0)o.x+=W; else if(o.x>W)o.x-=W; if(o.y<0)o.y+=H; else if(o.y>H)o.y-=H; }
    function spark(x,y,col,n){ for(let i=0;i<(n||10);i++){ const a=Math.random()*7,s=rand(30,150); parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.3,.6),max:.6,r:rand(1,2.6),col}); } }
    function fire(){ if(ship.cd>0||bullets.length>=5) return; ship.cd=0.17;
      bullets.push({x:ship.x+Math.cos(ship.a)*14,y:ship.y+Math.sin(ship.a)*14,vx:Math.cos(ship.a)*430+ship.vx,vy:Math.sin(ship.a)*430+ship.vy,life:0.85}); }
    function loseLife(){ lives--; spark(ship.x,ship.y,'#ff7a3c',24); Fx.flash('#e0476e',0.4,0.35); Fx.shake(8,0.4);
      if(lives<=0){ state='over'; return; } ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;ship.a=-Math.PI/2;ship.inv=2; }
    function splitRock(rk){ const i=rocks.indexOf(rk); if(i>=0) rocks.splice(i,1);
      spark(rk.x,rk.y,'#52e0d6',12);
      score += rk.size===3?20:rk.size===2?50:100;
      if(rk.size>1){ for(let k=0;k<2;k++){ const nr=mkRock(rk.x,rk.y,rk.size-1,wave); nr.vx+=rand(-20,20); nr.vy+=rand(-20,20); rocks.push(nr); } } }

    return {
      keydown(c){
        if(state!=='play'){ if((c==='Enter'||c==='Space') && !Fx.frozen()) reset(); return; }
        if(c==='Space') fire();
        if(c==='ArrowDown'){ ship.x=rand(20,W-20); ship.y=rand(20,H-20); ship.vx*=0.3; ship.vy*=0.3; ship.inv=0.6; }
      },
      update(dt){
        if(state!=='play') return; t+=dt; ship.cd-=dt;
        const wasInv = ship.inv>0; if(ship.inv>0)ship.inv-=dt;
        // if the blink is lapsing but a hazard is still on top, keep flashing until clear (flashing must mean safe)
        if(wasInv && ship.inv<=0){
          const SAFE=ship.r+26; let blocked=false;
          for(const rk of rocks){ if(Math.hypot(ship.x-rk.x,ship.y-rk.y)<rk.r+SAFE){ blocked=true; break; } }
          if(!blocked && saucer && Math.hypot(ship.x-saucer.x,ship.y-saucer.y)<saucer.r+SAFE) blocked=true;
          if(!blocked){ for(const s of sbolts){ if(Math.hypot(ship.x-s.x,ship.y-s.y)<SAFE){ blocked=true; break; } } }
          if(blocked) ship.inv=0.12; // stay intangible & flashing until the coast clears
        }
        // ship control
        if(keys.ArrowLeft) ship.a-=3.3*dt;
        if(keys.ArrowRight) ship.a+=3.3*dt;
        ship.thrust=!!keys.ArrowUp;
        if(ship.thrust){ ship.vx+=Math.cos(ship.a)*230*dt; ship.vy+=Math.sin(ship.a)*230*dt; if(Math.random()<0.6) spark(ship.x-Math.cos(ship.a)*12,ship.y-Math.sin(ship.a)*12,'#ff7a3c',1); }
        const sp=Math.hypot(ship.vx,ship.vy), MAX=330; if(sp>MAX){ ship.vx*=MAX/sp; ship.vy*=MAX/sp; }
        ship.vx*=Math.pow(0.6,dt); ship.vy*=Math.pow(0.6,dt);
        ship.x+=ship.vx*dt; ship.y+=ship.vy*dt; wrap(ship);
        if(keys.Space) fire();
        // bullets
        for(const b of bullets){ b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; wrap(b); }
        bullets=bullets.filter(b=>b.life>0);
        // rocks
        for(const rk of rocks){ rk.x+=rk.vx*dt; rk.y+=rk.vy*dt; rk.a+=rk.va*dt; wrap(rk); }
        // bullet vs rock
        for(const b of bullets){ for(const rk of rocks){ if(Math.hypot(b.x-rk.x,b.y-rk.y)<rk.r){ b.life=0; splitRock(rk); break; } } }
        bullets=bullets.filter(b=>b.life>0);
        // ship vs rock
        if(ship.inv<=0){ for(const rk of rocks){ if(Math.hypot(ship.x-rk.x,ship.y-rk.y)<rk.r+ship.r){ loseLife(); break; } } }
        // saucer
        saucerT-=dt;
        if(!saucer && saucerT<=0){ const fromL=Math.random()<0.5; saucer={x:fromL?-20:W+20,y:rand(60,H-60),vx:(fromL?1:-1)*(70+wave*4),r:14,cd:rand(1,2)}; }
        if(saucer){ saucer.x+=saucer.vx*dt; saucer.y+=Math.sin(t*1.6)*30*dt; saucer.cd-=dt;
          if(saucer.cd<=0){ saucer.cd=rand(1.1,2.0); const ang=Math.atan2(ship.y-saucer.y,ship.x-saucer.x)+rand(-0.18,0.18); sbolts.push({x:saucer.x,y:saucer.y,vx:Math.cos(ang)*200,vy:Math.sin(ang)*200,life:3}); }
          if(saucer.x< -40||saucer.x>W+40){ saucer=null; saucerT=rand(14,22); }
          else { for(const b of bullets){ if(saucer && Math.hypot(b.x-saucer.x,b.y-saucer.y)<saucer.r){ b.life=0; spark(saucer.x,saucer.y,'#e0476e',16); score+=150; saucer=null; saucerT=rand(14,22); break; } }
            if(saucer && ship.inv<=0 && Math.hypot(ship.x-saucer.x,ship.y-saucer.y)<saucer.r+ship.r){ loseLife(); saucer=null; saucerT=rand(14,22); } } }
        bullets=bullets.filter(b=>b.life>0);
        // saucer bolts
        for(const s of sbolts){ s.x+=s.vx*dt; s.y+=s.vy*dt; s.life-=dt; wrap(s);
          if(ship.inv<=0 && Math.hypot(ship.x-s.x,ship.y-s.y)<ship.r){ s.life=0; loseLife(); } }
        sbolts=sbolts.filter(s=>s.life>0);
        // particles
        for(const p of parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
        parts=parts.filter(p=>p.life>0);
        // wave clear
        if(rocks.length===0){ wave++; score+=50; newWave(wave); ship.inv=Math.max(ship.inv,1); }
      },
      render(){
        ctx.fillStyle='#070411'; ctx.fillRect(0,0,W,H);
        // starfield
        for(let i=0;i<60;i++){ const sx=(i*97+ (i*i*13))%W, sy=(i*53+i*i*7)%H; ctx.fillStyle=i%7===0?'rgba(176,122,224,.7)':'rgba(236,227,207,'+(0.2+(i%5)*0.12)+')'; ctx.fillRect(sx,sy,i%9===0?2:1,i%9===0?2:1); }
        // rocks
        for(const rk of rocks){ ctx.save(); ctx.translate(rk.x,rk.y); ctx.rotate(rk.a);
          ctx.strokeStyle='#6f5fa8'; ctx.lineWidth=2; ctx.fillStyle='rgba(46,35,72,.7)'; ctx.beginPath();
          rk.shape.forEach((m,k)=>{ const an=k/rk.shape.length*7; const rr2=rk.r*m; const px=Math.cos(an)*rr2, py=Math.sin(an)*rr2; k===0?ctx.moveTo(px,py):ctx.lineTo(px,py); });
          ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.fillStyle='rgba(82,224,214,.5)'; ctx.beginPath(); ctx.arc(0,0,2,0,7); ctx.fill(); ctx.restore(); }
        // saucer
        if(saucer){ ctx.save(); ctx.translate(saucer.x,saucer.y); ctx.fillStyle='#3a2c50'; ctx.beginPath(); ctx.ellipse(0,0,saucer.r,saucer.r*0.5,0,0,7); ctx.fill(); ctx.fillStyle='#e0476e'; ctx.beginPath(); ctx.arc(0,-3,saucer.r*0.4,Math.PI,0); ctx.fill(); ctx.restore(); }
        // bolts
        for(const s of sbolts){ ctx.fillStyle='#e0476e'; ctx.beginPath(); ctx.arc(s.x,s.y,3,0,7); ctx.fill(); }
        // bullets
        for(const b of bullets){ ctx.fillStyle='#9fe7ff'; ctx.beginPath(); ctx.arc(b.x,b.y,2.4,0,7); ctx.fill(); ctx.fillStyle='rgba(159,231,255,.4)'; ctx.beginPath(); ctx.arc(b.x,b.y,5,0,7); ctx.fill(); }
        // ship
        if(!(ship.inv>0 && Math.floor(t*20)%2)){ ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.a);
          if(ship.thrust){ ctx.fillStyle='#ff7a3c'; ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-18-rand(0,6),0); ctx.lineTo(-9,4); ctx.fill(); ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-9,-4); ctx.lineTo(-16,0); ctx.fill(); }
          ctx.strokeStyle='#52e0d6'; ctx.lineWidth=2; ctx.fillStyle='rgba(82,224,214,.18)';
          ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-9,-9); ctx.lineTo(-5,0); ctx.lineTo(-9,9); ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.fillStyle='#cda6ff'; ctx.beginPath(); ctx.arc(2,0,2.5,0,7); ctx.fill(); ctx.restore(); }
        // particles
        for(const p of parts){ ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.col; ctx.fillRect(p.x,p.y,p.r,p.r); ctx.restore(); }
        // HUD
        ctx.textAlign='left'; ctx.fillStyle='#52e0d6'; ctx.font='700 16px "Spline Sans Mono", monospace';
        ctx.fillText('SOULS '+String(score).padStart(5,'0'), 14, 26);
        ctx.textAlign='center'; ctx.fillStyle='#b9a7e6'; ctx.fillText('VEIL '+wave, W/2, 26);
        ctx.textAlign='right'; ctx.fillStyle='#ece3cf';
        for(let i=0;i<lives;i++){ ctx.save(); ctx.translate(W-20-i*20,22); ctx.rotate(-Math.PI/2); ctx.strokeStyle='#52e0d6'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(7,0); ctx.lineTo(-5,-5); ctx.lineTo(-2,0); ctx.lineTo(-5,5); ctx.closePath(); ctx.stroke(); ctx.restore(); }

        if(state==='over' && !Fx.frozen()) overlay([
          {t:'ADRIFT FOREVER', color:'#e0476e'},
          {t:'The void swallows your last light.'},
          {t:'Souls '+score+'  ·  Veil '+wave, color:'#52e0d6'},
          {t:'Enter / FIRE to wake anew', font:'italic 500 16px "Cormorant Garamond"', color:'#b9a7e6'}
        ]);
      },
      getState(){ return state; },
      getScore(){ return score; }
    };
  }

  // =====================================================================
  //  registry + navigation
  // =====================================================================
  const GAMES = {
    tetris: { title:'Runefall', make:Runefall },
    snake:  { title:'Loong',    make:Loong },
    archer: { title:'Arrowstorm', make:Arrowstorm },
    spire:  { title:'The Spire', make:Spire },
    graveward: { title:'Graveward', make:Graveward },
    voidwake:  { title:'Voidwake',  make:Voidwake },
  };

  function setHint(html){ hintEl.innerHTML=html; }
  function setActions(a,b){
    btnA.textContent=a||'•'; btnB.textContent=b||'•';
    btnB.style.visibility = (b && b!=='—')? 'visible':'hidden';
    btnA.style.visibility = (a && a!=='—')? 'visible':'hidden';
  }

  function startGame(key){
    currentKey=key;
    const g=GAMES[key];
    titleEl.textContent=g.title;
    menuEl.style.display='none';
    stageEl.classList.add('on');
    padEl.classList.add('on');
    // reset held keys
    for(const k in keys) keys[k]=false;
    Fx.reset(); prevPhase='play';
    SpireBridge.gameStartedAt = performance.now();
    current=g.make();
  }
  function toMenu(){
    current=null; currentKey=null; Fx.reset(); prevPhase='play';
    stageEl.classList.remove('on');
    padEl.classList.remove('on');
    menuEl.style.display='flex';
    ctx.clearRect(0,0,W,H);
  }

  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', ()=> startGame(card.dataset.game));
  });
  document.getElementById('backBtn').addEventListener('click', toMenu);

  // =====================================================================
  //  Spire reward bridge
  //
  //  Additive glue between this vendored bundle and the host app. The
  //  host owns a server-authoritative run: it posts an `init` message
  //  with a runId, and on every finished game we post that game's key,
  //  final score, and play duration back up. The host validates +
  //  credits server-side (this bundle is untrusted — see
  //  apps/server/src/routes/arcadeGrimhold.ts). No-ops harmlessly when
  //  opened standalone (runId stays null; messages just go nowhere).
  // =====================================================================
  const SpireBridge = {
    runId: null,
    gameStartedAt: 0,
    reportScore(){
      try {
        if(!current || !currentKey) return;
        const score = current.getScore ? current.getScore() : 0;
        const elapsedMs = Math.max(0, Math.round(performance.now() - (this.gameStartedAt||0)));
        window.parent.postMessage({
          source:'grimhold', type:'score',
          game: currentKey, score, elapsedMs, runId: this.runId,
        }, window.location.origin);
      } catch(e){ /* standalone / cross-origin: ignore */ }
    },
  };
  window.addEventListener('message', (ev)=>{
    if(ev.origin !== window.location.origin) return;
    const d = ev.data;
    if(d && d.source==='spire' && d.type==='init' && typeof d.runId==='string'){
      SpireBridge.runId = d.runId;
    }
  });
  // Announce readiness so the host can (re)send `init` if its run started
  // before this frame finished loading.
  try { window.parent.postMessage({ source:'grimhold', type:'ready' }, window.location.origin); } catch(e){ /* ignore */ }

  // Report the cabinet's natural height so the host window can size itself
  // to fit (the .screen is aspect-ratio:480/600, so the height is driven by
  // the WIDTH the host gives us — a fixed host height clips the on-screen
  // controls). Reporting the cabinet's own height (not the document's) is
  // loop-safe: the host changing the iframe HEIGHT never changes our WIDTH,
  // so the measured height is stable.
  function reportHeight(){
    try {
      const cab = document.querySelector('.cabinet');
      if(!cab) return;
      // + body padding (18px top/bottom, see body{padding:18px}).
      const h = Math.ceil(cab.getBoundingClientRect().height) + 36;
      window.parent.postMessage({ source:'grimhold', type:'resize', height:h }, window.location.origin);
    } catch(e){ /* ignore */ }
  }
  if(window.ResizeObserver){
    const cab = document.querySelector('.cabinet');
    if(cab) new ResizeObserver(()=>reportHeight()).observe(cab);
  }
  window.addEventListener('load', reportHeight);
  reportHeight();

})();
</script>
</body>
</html>
