# fly.toml app configuration file generated for thespire-still-rain-4187 on 2026-05-06T17:45:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'thespire-still-rain-4187'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = '/data/thekeep.sqlite'
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '8080'
  WEB_ORIGIN = ''

[[mounts]]
  source = 'thespire_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
