<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      no-referrer: prevents external resources loaded via admin-configured
      branding (banner cover image url(...), avatar URLs) from leaking the
      visitor's URL to third parties on their first paint.
    -->
    <meta name="referrer" content="no-referrer" />
    <!-- Favicons + platform tile icons. All served from apps/web/public/ at
         the root URL. Vite copies the public/ tree verbatim into the build. -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon-196x196.png" sizes="196x196" />
    <link rel="icon" type="image/png" href="/favicon-128.png" sizes="128x128" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <link rel="apple-touch-icon-precomposed" sizes="57x57" href="/apple-touch-icon-57x57.png" />
    <link rel="apple-touch-icon-precomposed" sizes="60x60" href="/apple-touch-icon-60x60.png" />
    <link rel="apple-touch-icon-precomposed" sizes="72x72" href="/apple-touch-icon-72x72.png" />
    <link rel="apple-touch-icon-precomposed" sizes="76x76" href="/apple-touch-icon-76x76.png" />
    <link rel="apple-touch-icon-precomposed" sizes="114x114" href="/apple-touch-icon-114x114.png" />
    <link rel="apple-touch-icon-precomposed" sizes="120x120" href="/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon-precomposed" sizes="144x144" href="/apple-touch-icon-144x144.png" />
    <link rel="apple-touch-icon-precomposed" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <meta name="msapplication-TileColor" content="#f4efe2" />
    <meta name="msapplication-TileImage" content="/mstile-144x144.png" />
    <meta name="msapplication-square70x70logo" content="/mstile-70x70.png" />
    <meta name="msapplication-square150x150logo" content="/mstile-150x150.png" />
    <meta name="msapplication-wide310x150logo" content="/mstile-310x150.png" />
    <meta name="msapplication-square310x310logo" content="/mstile-310x310.png" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- PWA manifest. Names, icons, and standalone display live in
         public/site.webmanifest (copied to the root by Vite). Paired with
         the msapplication tiles above so installs look right on every
         platform. `manifest-src 'self'` in the prod CSP already permits it. -->
    <link rel="manifest" href="/site.webmanifest" />

    <!--
      Preload the splash hero background. SplashLanding sets it via an inline
      `background-image`, which the browser only discovers AFTER the CSS/JS that
      applies it, so the 868 KB JPG starts late and drags LCP. A high-priority
      image preload lets the fetch start during the initial HTML parse. We
      preload the LIGHT variant because a fresh (unauthenticated, no cached
      theme) visitor resolves to the Parchment splash unless their OS prefers
      dark (see splashBgUrl in apps/web/src/lib/theme.ts); the dark variant
      loads on demand for dark-mode visitors. Keep this filename in sync with
      splashBgUrl if that path ever changes.

      Preload AVIF (what the `.splash-bg-*` CSS actually serves modern browsers);
      the rare no-AVIF browser ignores this and still gets the WebP via CSS. The
      `?v=1` is a cache-bust token: the images are cached immutably for a year, so
      when the commissioned art lands, bump this to `?v=2` here AND in styles.css
      (`.splash-bg-*` + the shell bg) to invalidate every cached copy at once. -->
    <link rel="preload" as="image" href="/the_spire_bg.avif?v=1" type="image/avif" fetchpriority="high" />

    <!--
      SEO + social-card meta. The server (apps/server/src/seo.ts) rewrites
      title, description, og:*, twitter:*, and the canonical link with the
      admin-configured siteName + metaDescription before serving the splash,
      so non-JS crawlers see live values. The defaults below are what
      anyone fetching the file directly (dev, raw GET) would see.
    -->
    <title>The Spire - Roleplay Chat, Communities &amp; Forums</title>
    <meta name="description" content="The Spire is a roleplay platform: host your own chat community or forum, or dive into live RP chat, character profiles, worlds, and collaborative writing." />
    <meta name="keywords" content="host your own roleplay community, create a roleplay forum, roleplay chat server hosting, roleplay chat, RP chat, online roleplay, play-by-post forum, community hosting, forum hosting, Discord alternative for roleplay, character roleplay, collaborative fiction, writing community, worldbuilding, The Spire" />
    <link rel="canonical" href="https://thespire.games/" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Spire - Roleplay Chat, Communities &amp; Forums" />
    <meta property="og:description" content="The Spire is a roleplay platform: host your own chat community or forum, or dive into live RP chat, character profiles, worlds, and collaborative writing." />
    <meta property="og:url" content="https://thespire.games/" />
    <meta property="og:image" content="/the_spire_og.jpg" />
    <meta property="og:site_name" content="The Spire" />
    <!--
      Static OG hints the server (seo.ts renderSplashHtml) does NOT rewrite
      per route: dimensions, alt text, and locale. Declaring the card size
      up front lets scrapers reserve the right aspect ratio; og:image:alt is
      the accessibility text for the card. Per-route images (forum/server
      banners) may differ in size, but 1200x630 is the standard large-card
      ratio our default hero targets, and scrapers treat these as advisory.
    -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Spire - roleplay chat, communities, and forums" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Spire - Roleplay Chat, Communities &amp; Forums" />
    <meta name="twitter:description" content="The Spire is a roleplay platform: host your own chat community or forum, or dive into live RP chat, character profiles, worlds, and collaborative writing." />
    <meta name="twitter:image" content="/the_spire_og.jpg" />

    <!--
      JSON-LD structured data. The server rewrites name + description with
      live values; url is rewritten to the absolute request origin. Schema
      type WebApplication is the closest match for an interactive chat app
      that runs in the browser without needing install.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "The Spire",
      "description": "The Spire is a roleplay platform: host your own chat community or forum, or dive into live RP chat, character profiles, worlds, and collaborative writing.",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Web",
      "url": "https://thespire.games/"
    }
    </script>

    <!-- Reading-font catalog. These match the dropdown in ProfileEditor
         (Settings → Reading & accessibility → Font family), loading
         them up-front keeps the picker preview accurate and avoids a
         FOUT when a user selects one. `display=swap` keeps text
         visible during the swap; preconnect saves a couple round-trips
         on first paint. Weights 400/700 only, chat doesn't use heavier
         display weights. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      The multi-family catalog is NON-blocking so it never sits on the
      critical path (10 families is a heavy sheet for a first paint). The base
      UI font is the self-hosted / system stack declared in styles.css, so the
      shell stays fully usable while these preview fonts stream in behind it;
      the picker still gets every family, just without blocking render.

      We preload the sheet (`as=style`) and swap it to a real stylesheet once
      it arrives. The swap runs from a nonced inline <script> rather than an
      inline `onload=` handler on purpose: the prod CSP is
      `script-src 'self' 'nonce-…' 'strict-dynamic'` with NO `script-src-attr`
      override, so an inline event-handler attribute would be blocked on the
      remote build (works in dev, breaks on prod). seo.ts stamps every inline
      <script> with the response nonce, so this one is permitted; a bare GET
      (dev, no server rewrite) ships no CSP header, so it runs there too. The
      <noscript> fallback loads the sheet blocking-style for no-JS agents. -->
    <link
      id="reading-fonts"
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;700&family=Lato:wght@400;700&family=Lora:wght@400;700&family=Merriweather:wght@400;700&family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&family=Roboto+Slab:wght@400;700&family=Source+Sans+3:wght@400;700&display=swap"
    />
    <script>
      // Flip the preloaded font sheet to an applied stylesheet. If it already
      // loaded (cache), the assignment applies immediately.
      (function () {
        var l = document.getElementById("reading-fonts");
        if (l) l.rel = "stylesheet";
      })();
    </script>
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;700&family=Lato:wght@400;700&family=Lora:wght@400;700&family=Merriweather:wght@400;700&family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&family=Roboto+Slab:wght@400;700&family=Source+Sans+3:wght@400;700&display=swap"
      />
    </noscript>

    <!-- HEAD_EXTRA: server splices admin-configured analytics scripts here. -->
  </head>
  <body>
    <!-- Theme is applied via a React-controlled wrapper inside #root, not on body. -->
    <div id="root"></div>
    <!-- `type="module"` already implies defer per spec, but the explicit
         attribute satisfies SEO auditors that score render-blocking by
         pattern-matching the script tag. -->
    <script type="module" defer src="/src/main.tsx"></script>
  </body>
</html>
