# Fly.io configuration for The Spire.
#
# Quickstart:
#   1. flyctl launch --no-deploy            # picks an app name + region
#   2. flyctl secrets set SESSION_SECRET=$(openssl rand -hex 32)
#   3. flyctl volumes create thespire_data --size 1 --region <your-region>
#   4. flyctl deploy
#
# Notes:
# - The app inside the container listens on PORT 8080. Fly's edge proxy maps
#   external 80 → that port (and 443 with TLS termination). Users hit
#   https://<app>.fly.dev with no port suffix; force_https=true upgrades :80
#   to :443 automatically.
# - SQLITE_PATH points at /data/thekeep.sqlite which lives on the mounted
#   volume so the SQLite file survives deploys and machine restarts.
#   (Named SQLITE_PATH and not DATABASE_URL because flyctl flags any
#   var named DATABASE_URL as "potentially sensitive" — that heuristic
#   assumes a Postgres-style connection string with embedded credentials,
#   but our value is just a filesystem path on the mounted volume, so
#   the rename clears the warning without smuggling a non-secret into
#   the secrets store. DATABASE_URL still works as a fallback on the
#   server side for anyone with an existing local .env.)
# - SESSION_SECRET MUST be set as a Fly secret before the first deploy or
#   the server will refuse to start (its index.ts has a min-length guard).

app = "thespire"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

# Static env. Secrets (SESSION_SECRET) go through `flyctl secrets set`.
[env]
  NODE_ENV = "production"
  PORT = "8080"
  WEB_ORIGIN = ""
  SQLITE_PATH = "/data/thekeep.sqlite"
  LOG_LEVEL = "info"

# Persistent SQLite storage. The volume's name must match the `source` here.
[[mounts]]
  source = "thespire_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: this is a chat app with long-lived WebSocket connections.
  # Auto-stopping would drop those mid-conversation and the cold-start on
  # the next request would feel like an outage. Keep the machine warm.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

# Health check — Fastify exposes /health unauthenticated. timeout is
# deliberately generous: /health itself is trivial, but a brief event-loop
# stall (synchronous SQLite under a load spike) can delay the response, and a
# tight 5s timeout turned those blips into machine restarts. 10s absorbs a
# transient spike without masking a real outage.
[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health"

[[vm]]
  # Dedicated CPU (not shared) — shared-cpu-1x got CPU-throttled under live
  # load, blocking the synchronous-SQLite event loop until even static 304s
  # took 18s and health checks failed. performance-1x removes the throttling;
  # 2GB ends the GC pressure from the old 512MB. Must stay in sync with the
  # live machine or `fly deploy` reverts it.
  size = "performance-1x"
  memory = "2048mb"
